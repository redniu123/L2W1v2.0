# SH-DA++ v5.1 Router Config

mainline:
  dataset_root: "data/l2w1data"
  test_jsonl: "data/l2w1data/test.jsonl"
  image_root: "data/l2w1data/images"
  agent_a_rec_model_dir: "./models/agent_a_ppocr/PP-OCRv5_server_rec_infer"
  mainline_agent_b: "Gemini Flash Preview 1x"
  prompt_version: "prompt_v1.1"
  formal_budgets: [0.10, 0.20, 0.30]
  frontier_entry: "scripts/run_efficiency_frontier.py"
  online_entry: "scripts/run_online_budget_control.py"
  cross_model_entry: "scripts/run_all_frontiers.py"

mainline_agent_b: "Gemini Flash Preview 1x"
prompt_version: "prompt_v1.1"

agent_b:
  skip: false
  backend: "gemini"             # gemini | local_vlm
  # 默认主力仍是 Gemini；本地 Qwen3-VL-8B 仅用于 API 不可用时的临时 router 对比验证
  # 临时切本地时：backend 改为 local_vlm，并将 model_path 指到服务器上的离线模型目录
  model_type: "qwen2.5_vl"
  model_path: "./models/agent_b_vlm/Qwen3-VL-8B"
  # 绝对红线: 2080Ti (Turing) 禁用 bfloat16，强制 float16
  torch_dtype: "float16"
  max_new_tokens: 128
  # --- Gemini API settings (backend=gemini 时生效) ---
  base_url: "https://new.lemonapi.site/v1"
  key_file: "key.txt"
  provider_pool: "gemini_1x"
  temperature: 0.1
  max_tokens: 256
  max_retries: 3
  timeout: 360
  model_name: "gemini-3-flash-preview"
  max_concurrency: 4

backfill:
  max_edit_distance: 3
  unified_prompt_mode: true

sh_da_v4:
  circuit_breaker:
    enabled: true
    min_samples: 20
    rejection_rate_threshold: 0.60
    cooldown_steps: 50

  calibrated_scorer:
    enabled: false

  rule_scorer:
    v_min: 0.0
    v_max: 5.0
    lambda_threshold: 0.5
    eta: 0.5
    geology_dict_path: "data/dicts/Geology.txt"
    geology_min_len: 2
    geology_risk_weight: 1.0
    wur_mean_weight: 0.5
    wur_min_weight: 0.3
    wur_drop_weight: 0.2
    wur_min_conf_gate_threshold: 0.35
    wur_drop_gate_threshold: 0.20
    wur_gate_bonus: 0.10

  budget_controller:
    target_budget: 0.1
    lambda_init: 0.5
    lambda_min: 0.0
    lambda_max: 1.0
    alpha: 0.01
