# SH-DA++ v5.1 Router Config

agent_b:
  skip: false
  backend: "gemini"             # gemini | local_vlm
  # 可选 model_type:
  #   qwen2.5_vl, qwen3.5, internvl2, internvl2_5,
  #   minicpm_v, paddleocr_vl, llava, smolvlm
  model_type: "qwen2.5_vl"
  model_path: "./models/agent_b_vlm/Qwen2.5-VL-7B-Instruct"
  # 绝对红线: 2080Ti (Turing) 禁用 bfloat16，强制 float16
  torch_dtype: "float16"
  max_new_tokens: 128
  # --- Gemini API settings (backend=gemini 时生效) ---
  model_name: "gemini-3-flash-preview"

backfill:
  max_edit_distance: 3
  unified_prompt_mode: true

sh_da_v4:
  circuit_breaker:
    enabled: true
    min_samples: 20
    rejection_rate_threshold: 0.60
    cooldown_steps: 50

  calibrated_scorer:
    enabled: false

  rule_scorer:
    v_min: 0.0
    v_max: 5.0
    lambda_threshold: 0.5
    eta: 0.5
    geology_dict_path: "data/dicts/Geology.txt"
    geology_min_len: 2
    geology_risk_weight: 1.0

  budget_controller:
    target_budget: 0.1
    lambda_init: 0.5
    lambda_min: 0.0
    lambda_max: 1.0
    alpha: 0.01
