repos:
  - repo: local
    hooks:
      - id: repo-safety
        name: repository safety guard
        entry: python scripts/check_repo_safety.py
        language: system
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(src/l2w1|tests)/.*\.py$
      - id: ruff-format
        files: ^(src/l2w1|tests)/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        args: [src/l2w1]
        pass_filenames: false
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        args: [tests]
        language: system
        pass_filenames: false
